[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
    ".git",
    "__pycache__",
    "migrations",
    ".venv",
    "venv",
]

[tool.ruff.lint]
# Enable: pycodestyle (E/W), pyflakes (F), isort (I), bugbear (B), simplify (SIM)
select = ["E", "W", "F", "I", "B", "SIM"]
ignore = [
    "E501",   # Line too long (handled by formatter)
    "B008",   # Do not perform function calls in default arguments (common in Django/DRF)
]

[tool.ruff.lint.isort]
known-first-party = ["config", "core"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.development"
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
testpaths = ["core", "modules", "tests"]
